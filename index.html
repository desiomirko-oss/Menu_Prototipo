<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Menu Digitale</title>
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="sticky-header">
    <div class="header-top">
      <button id="btn-back" class="hidden" onclick="goBack()">&#8592;</button>
      <div class="header-titles">
        <h1 id="restaurant-name">Nome Ristorante</h1>
        <p id="restaurant-subtitle">Il nostro menu digitale</p>
      </div>
    </div>

    <div id="filters-section" class="filters-container">
      <button class="filter-btn" data-filter="gf">Senza Glutine</button>
      <button class="filter-btn" data-filter="veg">Vegetariano</button>
      <button class="filter-btn" data-filter="na">Analcolico</button>
    </div>
  </header>

  <main id="app-content">
    
    <div id="macro-section" class="macro-container">
      <a href="#" id="macro-cibo" class="macro-card" onclick="filtraPerMacro('CIBO'); return false;">Cibo</a>
      <a href="#" id="macro-bevande" class="macro-card" onclick="filtraPerMacro('BEVANDA'); return false;">Bevande</a>
    </div>

    <div id="dishes-section" class="dishes-container">
      </div>
    
  </main>

  <button id="btn-top" class="hidden" onclick="scrollToTop()">&#8593;</button>

  <script src="js/app.js"></script>
</body>
</html>
