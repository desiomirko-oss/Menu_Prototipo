<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Menu Core V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
        .page-transition { display: none; }
        .active-page { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Loader Spinner */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-900">

    <header class="fixed top-0 w-full z-50 glass-header px-4 py-3 flex flex-col items-center">
        <div id="logo-container" class="mb-1">
            <div class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold">M</div>
        </div>
        <h1 id="business-name" class="text-lg font-bold tracking-tight uppercase">Menu Digitale</h1>
        <p id="lang-indicator" class="text-[10px] text-gray-500 uppercase tracking-widest">Caricamento...</p>
        
        <button id="back-button" onclick="goBack()" class="absolute left-4 top-1/2 -translate-y-1/2 hidden bg-white/50 p-2 rounded-full shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor font-bold">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
    </header>

    <main class="pt-32 pb-10 px-4 max-w-md mx-auto relative">
        
        <div id="loading-screen" class="active-page flex flex-col items-center justify-center pt-20">
            <div class="loader mb-4"></div>
            <p id="loading-text" class="text-gray-500 font-medium">Preparazione menu...</p>
        </div>

        <section id="page-macro" class="page-transition space-y-4"></section>
        <section id="page-categories" class="page-transition space-y-4"></section>
        <section id="page-items" class="page-transition space-y-4"></section>

    </main>
