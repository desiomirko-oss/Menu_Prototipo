<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Digitale Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --app-bg: #f9fafb; --header-bg: rgba(255, 255, 255, 0.95); --header-h: 120px;
            --back-bg: rgba(255, 255, 255, 0.9); --back-color: #4f46e5; --macro-h: 180px;
            --card-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            --menu-card-bg: #ffffff; --menu-card-p: 20px; --menu-card-r: 24px;
            --menu-card-border: 1px solid #f3f4f6; --menu-card-shadow: var(--card-shadow);
            --cat-card-min-h: 80px; --item-card-min-h: 120px;
            --i-name-f: sans-serif; --i-name-c: #111827; --i-name-s: 18px; --i-name-w: bold; --i-name-mb: 4px; --i-name-sh: none;
            --i-desc-f: sans-serif; --i-desc-c: #6b7280; --i-desc-s: 14px; --i-desc-w: normal; --i-desc-mb: 8px; --i-desc-sh: none;
            --i-allg-f: sans-serif; --i-allg-c: #f87171; --i-allg-s: 11px; --i-allg-w: normal; --i-allg-mb: 8px; --i-allg-sh: none;
            --i-pric-f: sans-serif; --i-pric-c: #4f46e5; --i-pric-s: 16px; --i-pric-w: bold; --i-pric-sh: none;
            --macro-txt-sh: none; --level-txt-sh: none; --level-mb: 25px; 
            --i-photo-w: 110px; --i-photo-h: 110px; --i-photo-sh: none;
            --flt-f: sans-serif; --flt-s: 11px; --flt-w: bold;
            --flt-bg-i: #f3f4f6; --flt-c-i: #9ca3af;
            --flt-bg-a: #4f46e5; --flt-c-a: #ffffff;
        }

        body {
            background-color: var(--app-bg); background-image: var(--app-bg-img, none);
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; margin: 0; overscroll-behavior-y: none; 
        }

        #main-header {
            background: var(--header-bg); height: var(--header-h); 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 999;
            display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 0 20px; transition: all 0.3s ease; overflow: hidden;
        }

        #sub-header {
            background: var(--header-bg); position: fixed; width: 100%; z-index: 998;
            top: var(--header-h); left: 0; display: none; flex-direction: column; align-items: center;
            border-radius: 0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.05); transition: all 0.3s ease;
        }

        #back-button {
            position: fixed; left: 15px; width: 44px; height: 44px;
            background: var(--back-bg); color: var(--back-color);
            display: none; align-items: center; justify-content: center; border-radius: 50%;
            box-shadow: var(--card-shadow); z-index: 1000; cursor: pointer; border: 1px solid rgba(0,0,0,0.05);
        }

        .macro-card { height: var(--macro-h); border-radius: 1.25rem; background-size: cover; background-position: center; position: relative; overflow: hidden; box-shadow: var(--card-shadow); transition: all 0.2s ease; }
        .cat-card { min-height: var(--cat-card-min-h); position: relative; background-size: cover; background-position: center; overflow: hidden; }
        .cat-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.6), rgba(0,0,0,0.1)); }

        .item-name { font-family: var(--i-name-f); color: var(--i-name-c); font-size: var(--i-name-s); font-weight: var(--i-name-w); margin-bottom: var(--i-name-mb); text-shadow: var(--i-name-sh); }
        .item-desc { font-family: var(--i-desc-f); color: var(--i-desc-c); font-size: var(--i-desc-s); line-height: 1.4; margin-bottom: var(--i-desc-mb); }
        .item-price { font-family: var(--i-pric-f); color: var(--i-pric-c); font-size: var(--i-pric-s); font-weight: var(--i-pric-w); }

        .filter-btn {
            font-family: var(--flt-f); font-size: var(--flt-s); font-weight: var(--flt-w);
            background-color: var(--flt-bg-i); color: var(--flt-c-i);
            padding: 8px 16px; border-radius: 9999px; transition: all 0.2s ease;
            text-transform: uppercase; letter-spacing: 0.1em; flex-shrink: 0;
        }
        .filter-btn.active { background-color: var(--flt-bg-a) !important; color: var(--flt-c-a) !important; }

        .ar-badge { background: #000; color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 4px; display: inline-flex; align-items: center; gap: 3px; margin-top: 5px; }

        .page-content { animation: pageIn 0.3s ease-out forwards; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--back-color); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header id="main-header">
        <div id="header-content-wrapper"><div id="logo-container"></div><div id="subtitle-container"></div></div>
    </header>

    <div id="sub-header">
        <h2 id="sub-header-title" class="text-[12px] font-black text-gray-500 uppercase tracking-[0.2em] pt-4 px-4 text-center"></h2>
        <div id="sub-header-filters" class="flex flex-row gap-2 overflow-x-auto p-4 w-full no-scrollbar"></div>
    </div>

    <button id="back-button" onclick="goBack()"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>

    <main id="main-content" class="px-5 pb-10 max-w-md mx-auto relative">
        <div id="loading-screen" class="flex flex-col items-center pt-20"><div class="loader mb-4"></div><p class="text-gray-400 text-sm uppercase tracking-widest">Sincronizzazione...</p></div>
        <section id="page-macro" style="display: none;"><div id="macro-layout-container" class="page-content space-y-4"></div></section>
        <section id="page-categories" style="display: none;" class="page-content space-y-4"></section>
        <section id="page-items" style="display: none;" class="page-content space-y-4"></section>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const SHEET_ID = urlParams.get('id'); 
        let appConfig = {}, fullData = [], navigationStack = ['page-macro'], activeFilters = [];
        let currentMacro = '', currentCat = '';

        function isTruthy(v) { return ['TRUE', 'SI', 'SÌ', 'YES', '1'].includes(String(v).toUpperCase().trim()); }

        async function init() {
            if (!SHEET_ID) return;
            await fetchConfig(); applyConfig(); await fetchMenu();
        }

        async function fetchConfig() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=config&t=${Date.now()}`;
            try {
                const res = await fetch(url);
                const csv = await res.text();
                csv.split('\n').forEach(row => {
                    const [k, v] = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(k) appConfig[k.replace(/"/g,'').trim()] = v ? v.replace(/"/g,'').trim() : '';
                });
            } catch(e) { console.error("Config Fail"); }
        }

        function applyConfig() {
            const r = document.documentElement;
            const bgT = (appConfig.Bg_Type || 'color').toLowerCase();
            r.style.setProperty('--app-bg', appConfig.Bg_Color || '#f9fafb');
            if(bgT === 'image') r.style.setProperty('--app-bg-img', `url('${appConfig.Bg_Image_URL}')`);

            const lCont = document.getElementById('logo-container');
            const lType = (appConfig.Logo_Type || 'text').toLowerCase();
            if(lType === 'image') {
                lCont.innerHTML = `<img src="${appConfig.Logo_Image_URL}" style="max-height:${appConfig.Logo_Image_Size || '50px'}; margin: auto;">`;
            } else {
                lCont.innerHTML = `<h1 style="color:${appConfig.Logo_Text_Color}; font-size:${appConfig.Logo_Text_Size}; text-align:center; font-weight:bold;">${appConfig.Logo_Text || 'MENU'}</h1>`;
            }
            
            const sub = document.getElementById('subtitle-container');
            sub.innerHTML = `<p style="text-align:center; font-size:12px; color:#6b7280;">${appConfig.Subtitle_Text || ''}</p>`;
        }

        async function fetchMenu() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=menu&t=${Date.now()}`;
            try {
                const res = await fetch(url);
                const csv = await res.text();
                fullData = csv.split('\n').slice(1).map(row => {
                    const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,'').trim());
                    return { macro: c[0], cat: c[1], name: c[2], desc: c[3], allerg: c[4], price: c[5], gf: c[6], vegan: c[7], veg: c[8], noalc: c[9], active: c[10], photo: c[11], ar: c[12] };
                }).filter(i => isTruthy(i.active));
                document.getElementById('loading-screen').style.display = 'none';
                renderMacro();
            } catch(e) { console.error("Menu Fail"); }
        }

        function renderMacro() {
            const cont = document.getElementById('macro-layout-container');
            cont.innerHTML = '';
            [...new Set(fullData.map(i => i.macro))].forEach(m => {
                const img = appConfig[`Macro_Img_${m}`];
                cont.innerHTML += `<div onclick="renderCat('${m}')" class="macro-card flex items-center justify-center cursor-pointer" style="background-image:url('${img}')">
                    <div class="macro-overlay"></div><span class="relative text-white font-bold text-xl uppercase tracking-widest">${m}</span></div>`;
            });
            showPage('page-macro');
        }

        function renderCat(m) {
            currentMacro = m;
            const cont = document.getElementById('page-categories');
            cont.innerHTML = '';
            const cats = [...new Set(fullData.filter(i => i.macro === m).map(i => i.cat))];
            cats.forEach(c => {
                const img = appConfig[`Category_Img_${c}`];
                cont.innerHTML += `<div onclick="renderItems('${m}','${c}')" class="menu-card cat-card flex items-center justify-between cursor-pointer" style="background-image:url('${img}')">
                    <div class="cat-overlay"></div><span class="relative font-bold ${img ? 'text-white' : 'text-gray-800'} text-lg">${c}</span>
                    <svg class="w-5 h-5 relative ${img ? 'text-white' : 'text-gray-400'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
            });
            navigationStack.push('page-categories');
            showPage('page-categories');
        }

        function toggleFilter(f) {
            activeFilters = activeFilters.includes(f) ? [] : [f];
            renderItems(currentMacro, currentCat, true);
        }

        function renderItems(m, c, isF = false) {
            currentMacro = m; currentCat = c;
            const cont = document.getElementById('page-items');
            if(!isF) {
                document.getElementById('sub-header-title').innerText = c;
                const fCont = document.getElementById('sub-header-filters');
                fCont.innerHTML = '';
                const isBev = m.toLowerCase().includes('bev');
                const filters = isBev ? [['noalc','Analcolico']] : [['gf','Senza Glutine'],['vegan','Vegano'],['veg','Vegetariano']];
                filters.forEach(f => {
                    fCont.innerHTML += `<button onclick="toggleFilter('${f[0]}')" class="filter-btn ${activeFilters.includes(f[0])?'active':''}">${f[1]}</button>`;
                });
            }

            cont.innerHTML = '';
            let items = fullData.filter(i => i.macro === m && i.cat === c);
            if(activeFilters.length) items = items.filter(i => isTruthy(i[activeFilters[0]]));

            items.forEach(i => {
                const arBtn = i.ar ? `<a href="${i.ar}" class="ar-badge">🔍 VEDI IN AR</a>` : '';
                cont.innerHTML += `<div class="menu-card flex gap-4">
                    <div class="flex-grow">
                        <h3 class="item-name">${i.name}</h3><p class="item-desc">${i.desc}</p>
                        <span class="text-[10px] text-red-400">${i.allerg?'Allergeni: '+i.allerg:''}</span>
                        <div>${arBtn}</div><div class="mt-2 item-price">${i.price}€</div>
                    </div>
                    ${i.photo ? `<img src="${i.photo}" class="item-photo">` : ''}
                </div>`;
            });
            if(!isF) { navigationStack.push('page-items'); showPage('page-items'); }
        }

        function showPage(p) {
            ['page-macro','page-categories','page-items'].forEach(s => document.getElementById(s).style.display = 'none');
            document.getElementById(p).style.display = 'block';
            document.getElementById('sub-header').style.display = p === 'page-items' ? 'flex' : 'none';
            document.getElementById('back-button').style.display = p === 'page-macro' ? 'none' : 'flex';
            autoAdjustPadding();
        }

        function goBack() { if(navigationStack.length > 1) { navigationStack.pop(); showPage(navigationStack[navigationStack.length-1]); } }

        function safeParseCSVRow(str) {
            let arr = [], quote = false, cell = '';
            for (let i = 0; i < str.length; i++) {
                let c = str[i];
                if (c === '"' && str[i+1] === '"') { cell += '"'; i++; } 
                else if (c === '"') quote = !quote;
                else if (c === ',' && !quote) { arr.push(cell.trim()); cell = ''; }
                else cell += c;
            }
            arr.push(cell.trim());
            return arr.map(x => x.replace(/^"|"$/g, '').trim());
        }

        init();
    </script>
</body>
</html>
