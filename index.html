<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Menu Digitale</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f4fc03">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="install-banner" class="hidden">
    <span>Installa la nostra App per un accesso rapido!</span>
    <button id="install-btn">Installa</button>
    <button id="close-banner-btn">X</button>
  </div>

  <button id="btn-back" onclick="goBack()">&#8592; Indietro</button>
  <button id="btn-top" onclick="scrollToTop()">&#8593;</button>

  <div id="macro-section" class="macro-container">
    <a href="#cat-section" id="macro-cibo" class="macro-card" onclick="filtraPerMacro('CIBO')">Cibo</a>
    <a href="#cat-section" id="macro-bevande" class="macro-card" onclick="filtraPerMacro('BEVANDA')">Bevande</a>
  </div>

  <div id="filters-section" class="filters-container">
    <button class="filter-btn" data-filter="gf">Senza Glutine</button>
    <button class="filter-btn" data-filter="veg">Vegetariano</button>
    <button class="filter-btn" data-filter="na">Analcolico</button>
  </div>

  <div id="dishes-section" class="dishes-container">
    </div>

  <script src="app.js"></script>
</body>
</html>
