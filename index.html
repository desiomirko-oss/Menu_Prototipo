<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Menu Ultimate PWA</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root { --p: #000; --bg: #fff; --c-bg: #fff; --m-h: 200px; --m-fs: 2rem; --m-c: #fff; --f-main: 'Segoe UI', sans-serif; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin:0; font-family: var(--f-main); background-color: var(--bg); min-height: 100vh; color: #222; overflow-x: hidden; }
        
        #bg-layer { position:fixed; inset:0; z-index:-1; background-size:cover; background-position:center; transition: 0.8s ease; }
        
        /* Loader con effetto blur */
        #loader { position:fixed; inset:0; background:rgba(255,255,255,0.9); backdrop-filter:blur(10px); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; transition: 0.5s; }
        .spin { width:50px; height:50px; border:4px solid #f3f3f3; border-top:4px solid var(--p); border-radius:50%; animation: s 1s linear infinite; }
        @keyframes s { 100% { transform:rotate(360deg); } }

        /* Header Professionale */
        header { padding: 40px 20px; text-align:center; position:sticky; top:0; z-index:100; transition: 0.3s; }
        .h-blur { background: rgba(255,255,255,0.8); backdrop-filter: blur(15px); box-shadow: 0 4px 30px rgba(0,0,0,0.05); padding: 20px; }
        
        #logo-wrap h1 { margin:0; font-size: var(--l-fs, 2.2rem); color: var(--l-c, #000); font-weight:900; text-transform:uppercase; letter-spacing:-1px; cursor:pointer; }
        #logo-wrap img { max-height: 90px; display:block; margin:0 auto; cursor:pointer; }
        #subt { font-size: 0.95rem; margin-top:8px; font-weight: 600; color: var(--s-c, #666); }

        .container { padding:15px; max-width:800px; margin:auto; min-height: 70vh; }

        /* Layout Grid & List */
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:15px; }
        .list { display:flex; flex-direction:column; gap:15px; }

        /* Card Full Background (Macro o Categorie BG) */
        .card-full { 
            height: var(--h); border-radius: 25px; overflow:hidden; position:relative; 
            display:flex; align-items:center; justify-content: center; cursor:pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); transition: 0.3s;
        }
        .card-full:active { transform: scale(0.97); }
        .card-full img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }
        .card-full .ov { position:absolute; inset:0; background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 100%); z-index:2; }
        .card-full span { position:relative; z-index:3; color: var(--m-c); font-size: var(--m-fs); font-weight:900; text-transform:uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.4); text-align:center; padding:10px; }

        /* Card Clip (Icone Circolari) */
        .card-clip { 
            background: var(--c-bg); border-radius: 20px; padding: 20px; text-align:center; 
            cursor:pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .card-clip img { width: 90px; height: 90px; object-fit:cover; border-radius: 50%; margin: 0 auto 12px; border: 3px solid var(--p); }
        .card-clip b { display:block; font-size: 1rem; text-transform: uppercase; font-weight: 800; color: #333; }

        /* Dettaglio Piatti */
        .dish-card { 
            background: var(--c-bg); border-radius: 22px; padding: 15px; display:flex; align-items:center; 
            margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f0f0f0;
        }
        .dish-img { width: 85px; height: 85px; object-fit:cover; border-radius: 16px; margin-right: 15px; }
        .dish-info { flex:1; }
        .dish-name { font-weight: 800; font-size: 1.15rem; margin:0; color: #111; }
        .dish-desc { font-size: 0.85rem; color: #777; margin: 4px 0; line-height: 1.3; }
        .dish-price { font-weight: 900; color: var(--p); font-size: 1.2rem; margin-top: 8px; }

        .back-nav { display:inline-flex; align-items:center; padding:12px 25px; background:rgba(0,0,0,0.07); border-radius:50px; font-weight:800; margin-bottom:20px; cursor:pointer; font-size: 13px; text-transform: uppercase; }
        
        .ani { animation: up 0.5s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
        @keyframes up { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>

<div id="loader"><div class="spin"></div><p id="l-msg" style="margin-top:15px; font-weight:bold;">Sincronizzazione...</p></div>
<div id="bg-layer"></div>

<header id="h-main">
    <div id="logo-wrap"></div>
    <div id="subt"></div>
</header>

<div class="container">
    <div id="view"></div>
</div>

<script>
    const SID = new URLSearchParams(window.location.search).get('id');
    const LANG = navigator.language.split('-')[0].toLowerCase();
    let db = [], cfg = {}, st = { m: null, c: null };

    // Pulizia chiavi: "Layout Mode" -> "layoutmode"
    const cl = (s) => s ? s.toString().toLowerCase().replace(/[^a-z0-9]/g, '') : '';

    // MOTORE DI TRADUZIONE NEURALE (Google Translate API)
    async function translate(text) {
        if (!text || LANG === 'it' || text.startsWith('http')) return text;
        try {
            const res = await axios.get(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=it&tl=${LANG}&dt=t&q=${encodeURI(text)}`);
            return res.data[0][0][0];
        } catch (e) { return text; }
    }

    async function init() {
        if(!SID) return;
        const ts = Date.now();
        try {
            const [csvC, csvM] = await Promise.all([
                fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Config&v=${ts}`).then(r => r.text()),
                fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Menu&v=${ts}`).then(r => r.text())
            ]);

            // Parsing Config con logica "Brute Force"
            csvC.split('\n').forEach(row => {
                const p = row.split(',').map(c => c.replace(/^"|"$/g, '').trim());
                if(p.length >= 2) cfg[cl(p[0])] = p[1];
            });

            // Parsing Menu
            const rowsM = csvM.split('\n').map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
            const headM = rowsM[0].map(h => cl(h));
            
            const rawItems = rowsM.slice(1).map(row => {
                let obj = {};
                headM.forEach((h, i) => obj[h] = row[i]);
                return obj;
            }).filter(i => cl(i.attivo) === 'si');

            // Traduzione automatica se lingua non è italiano
            if (LANG !== 'it') {
                document.getElementById('l-msg').innerText = "Traduzione in corso...";
                for (let i of rawItems) {
                    i.nomeit = await translate(i.nomeit);
                    i.descit = await translate(i.descit);
                    i.categoria = await translate(i.categoria);
                    i.macro = await translate(i.macro);
                }
            }
            db = rawItems;

            applyStyles();
            render();
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 500);
        } catch (e) { console.error("Errore:", e); }
    }

    function applyStyles() {
        const s = document.documentElement.style;
        const lw = document.getElementById('logo-wrap');
        
        // Sfondo dinamico
        if(cl(cfg.appbgtype) === 'image' && cfg.appbgimage) {
            document.getElementById('bg-layer').style.backgroundImage = `url('${cfg.appbgimage}')`;
            s.setProperty('--bg', 'transparent');
        } else {
            s.setProperty('--bg', cfg.appbgcolor || '#f8f9fa');
        }

        // Logo / Titolo
        if(cl(cfg.logotype) === 'text') {
            lw.innerHTML = `<h1 onclick="home()">${cfg.logotext || 'MENU'}</h1>`;
            s.setProperty('--l-c', cfg.logotextcolor || '#000');
            s.setProperty('--l-fs', cfg.logotextsize || '2.2rem');
        } else {
            lw.innerHTML = `<img src="${cfg.logourl}" onclick="home()">`;
        }

        // Sottotitolo
        if(cl(cfg.showsubtitle) === 'si') {
            const stx = document.getElementById('subt');
            stx.innerText = cfg.appsubtitle || '';
            s.setProperty('--s-c', cfg.subtitlecolor || '#666');
        }

        // Variabili CSS dal foglio Config
        s.setProperty('--p', cfg.themeprimary || '#000');
        s.setProperty('--c-bg', cfg.cardbg || '#fff');
        s.setProperty('--m-h', cfg.macroheight || '200px');
        s.setProperty('--m-fs', cfg.macrotextsize || '2rem');
        s.setProperty('--m-c', cfg.macrotextcolor || '#fff');
        if(cfg.fontmain) s.setProperty('--f-main', cfg.fontmain);
    }

    function render() {
        const out = document.getElementById('view');
        const mode = cl(cfg.layoutmode);
        out.innerHTML = '';

        if(mode === 'macro' && !st.m) {
            const ms = [...new Set(db.map(i => i.macro).filter(m => m))];
            let h = `<div class="${cl(cfg.macrolayout) === 'grid' ? 'grid' : 'list'} ani">`;
            ms.forEach(m => {
                const img = db.find(i => i.macro === m && i.catfotourl)?.catfotourl || '';
                h += `<div class="card-full" style="--h: var(--m-h)" onclick="st.m='${m}';render()"><img src="${img}"><div class="ov"></div><span>${m}</span></div>`;
            });
            out.innerHTML = h + '</div>';
        } 
        else if((mode === 'macro' && st.m && !st.c) || (mode !== 'macro' && !st.c)) {
            const filtered = st.m ? db.filter(i => i.macro === st.m) : db;
            const cats = [...new Set(filtered.map(i => i.categoria))];
            const isClip = cl(cfg.catlayoutmode) === 'clip';

            let h = st.m ? `<div class="back-nav" onclick="st.m=null;render()">← Menu</div>` : '';
            h += `<div class="${isClip ? 'grid' : (cl(cfg.catlayout) === 'grid' ? 'grid' : 'list')} ani">`;
            
            cats.forEach(c => {
                const img = filtered.find(i => i.categoria === c && i.catfotourl)?.catfotourl || '';
                if(isClip) {
                    h += `<div class="card-clip" onclick="st.c='${c}';render()"><img src="${img}"><b>${c}</b></div>`;
                } else {
                    h += `<div class="card-full" style="--h: ${cfg.catheight || '140px'}" onclick="st.c='${c}';render()"><img src="${img}"><div class="ov"></div><span>${c}</span></div>`;
                }
            });
            out.innerHTML = h + '</div>';
        } 
        else {
            const items = db.filter(i => i.categoria === st.c);
            let h = `<div class="back-nav" onclick="st.c=null;render()">← Indietro</div><div class="ani">`;
            items.forEach(i => {
                const p = (i.prezzo || '0').toString().replace(':', '.');
                h += `<div class="dish-card">
                    ${i.fotourl && i.fotourl !== 'https://' ? `<img src="${i.fotourl}" class="dish-img">` : ''}
                    <div class="dish-info">
                        <div class="dish-name">${i.nomeit}</div>
                        <div class="dish-desc">${i.descit || ''}</div>
                        <div class="dish-price">${p}€</div>
                    </div>
                </div>`;
            });
            out.innerHTML = h + '</div>';
        }
    }

    window.home = () => { st.m = st.c = null; render(); };
    window.onscroll = () => document.getElementById('h-main').classList.toggle('h-blur', window.scrollY > 20);
    init();
</script>
</body>
</html>
