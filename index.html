<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Menu Master V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Variabili Root popolate dal Config */
        :root {
            --app-bg: #f3f4f6;
            --app-bg-image: none;
            --app-bg-size: cover;
            --app-bg-pos: center;
            
            --header-bg: rgba(255, 255, 255, 0.8);
            --header-height: 100px;
            
            --sub-font: sans-serif;
            --sub-color: #6b7280;
            --sub-size: 14px;
            --sub-weight: normal;
            --sub-align: center;

            --logo-font: sans-serif;
            --logo-color: #000;
            --logo-size: 24px;
            --logo-weight: bold;
            --logo-align: center;
            --logo-img-size: 50px;
        }

        body {
            background-color: var(--app-bg);
            background-image: var(--app-bg-image);
            background-size: var(--app-bg-size);
            background-position: var(--app-bg-pos);
            background-attachment: fixed; /* Lo sfondo resta fermo allo scroll */
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .glass-header {
            background: var(--header-bg);
            height: var(--header-height);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .dynamic-subtitle {
            font-family: var(--sub-font);
            color: var(--sub-color);
            font-size: var(--sub-size);
            font-weight: var(--sub-weight);
            text-align: var(--sub-align);
        }

        .dynamic-logo-text {
            font-family: var(--logo-font);
            color: var(--logo-color);
            font-size: var(--logo-size);
            font-weight: var(--logo-weight);
            text-align: var(--logo-align);
        }

        .dynamic-logo-img {
            height: var(--logo-img-size);
            object-fit: contain;
        }

        .page-transition { display: none; }
        .active-page { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header id="main-header" class="glass-header px-6">
        <button id="back-button" onclick="goBack()" class="absolute left-4 hidden bg-white/50 p-2 rounded-full shadow-sm z-20">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <div id="header-content" class="flex flex-col w-full">
            <div id="logo-container" class="w-full flex"></div>
            <div id="subtitle-container" class="dynamic-subtitle mt-1"></div>
        </div>
    </header>

    <main id="main-content" class="px-4 pb-12 max-w-md mx-auto">
        <div id="loading-screen" class="flex flex-col items-center pt-40">
            <div class="loader mb-4"></div>
            <p id="loading-text" class="text-gray-500 font-medium bg-white/80 px-4 py-2 rounded-full">Caricamento...</p>
        </div>

        <section id="page-macro" class="page-transition space-y-4"></section>
        <section id="page-categories" class="page-transition space-y-4"></section>
        <section id="page-items" class="page-transition space-y-6"></section>
    </main>

        const SHEET_ID = urlParams.get('id'); 
        const userLang = (navigator.language || navigator.userLanguage).split('-')[0];

            if (!SHEET_ID) {
                document.getElementById('loading-screen').innerHTML = "<p class='bg-red-100 p-4 rounded text-red-700'>ID Cliente mancante nell'URL.</p>";
                return;
            }
            await fetchConfig();
            applyConfig();
            await fetchMenu();
        }

                }
            });
        }
