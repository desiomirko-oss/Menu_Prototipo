<!DOCTYPE html>
<html lang="it">
    <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <title>Menu Omnipotente v6</title>
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
        <link id="dynamic-fonts" rel="stylesheet">
    
        <style>
                    :root { --accent: #f4fc03; --bg: #ffffff; }
                    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

                    body { min-height: 100vh; background-attachment: fixed; transition: 0.3s; overflow-x: hidden; font-family: sans-serif; }

                    /* Loader */
                    #loader { position: fixed; inset: 0; z-index: 9999; background: #fff; display: flex; align-items: center; justify-content: center; }
                    .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
                    @keyframes spin { to { transform: rotate(360deg); } }

                    header { padding: 20px 15px; text-align: center; position: sticky; top: 0; z-index: 1000; background: inherit; }
                    #app-logo img { height: auto; max-width: 90vw; transition: 0.3s; }

                    .nav-bar { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 10px auto; padding: 0 15px; }
                    #btn-back { border: none; padding: 10px 20px; border-radius: 12px; font-weight: 900; cursor: pointer; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

                    .view { display: none; padding: 15px; max-width: 800px; margin: 0 auto; animation: fadeInUp 0.4s ease; }
                    .view.active { display: block; }
                    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

                    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
                    .list { display: flex; flex-direction: column; gap: 15px; }

                    .card-link { 
                                    border-radius: 25px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
                                    background-size: cover; background-position: center; box-shadow: 0 8px 20px rgba(0,0,0,0.15); cursor: pointer;
                    }
                    .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
                    .label { position: relative; z-index: 2; font-weight: 900; text-transform: uppercase; text-align: center; }

                    .p-card { padding: 20px; border-radius: 25px; margin-bottom: 15px; backdrop-filter: blur(5px); }
                    .p-img { width: 100%; border-radius: 15px; margin-bottom: 15px; }

                    #filter-bar { display: none; gap: 10px; justify-content: center; padding: 10px; overflow-x: auto; }
                    .f-btn { padding: 8px 16px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }

                    #btn-top { position: fixed; width: 50px; height: 50px; border-radius: 50%; border: none; display: none; align-items: center; justify-content: center; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
                </style>
    </head>
    <body>

        <div id="loader"><div class="spinner"></div>div></div>div>

        <header>
                <div id="app-logo"></div>div>
                <div id="app-subtitle"></div>div>
                <div class="nav-bar">
                            <button id="btn-back" onclick="goBack()">← INDIEETRO</button>button>
                            <div id="v-title" style="font-weight: 900; text-transform: uppercase;"></div>div>
                            <div style="width:40px"></div>div>
                </div>div>
                <div id="filter-bar"></div>div>
        </header>

        <main>
                <div id="v-macro" class="view"></div>div>
                <div id="v-cat" class="view"></div>div>
                <div id="v-items" class="view"></div>div>
        </main>

        <button id="btn-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">↑</button>button>

        <script>
                const urlParams = new URLSearchParams(window.location.search);
                const SHEET_ID = urlParams.get('id');
                const GID_MENU = "1832483838"; 

                let menuData = [], config = {}, state = { step: 'macro', m: null, c: null, filters: {} };

                // Sanitizzazione Totale
                const _clean = (s) => s ? s.toString().trim() : "";
                const _isYes = (s) => ["SI", "SÌ", "Sì", "YES"].includes(_clean(s).toUpperCase());

                async function init() {
                            if(!SHEET_ID) return;
                            try {
                                            const [cRaw, mRaw] = await Promise.all([fetchCSV(0), fetchCSV(GID_MENU)]);

                                            cRaw.forEach(r => config[_clean(r.Parametro)] = _clean(r.Valore));
                                            menuData = mRaw.map(r => {
                                                                let row = {};
                                                                Object.keys(r).forEach(k => row[_clean(k)] = _clean(r[k]));
                                                                return row;
                                            });

                                            applyUI();

                                            const mode = _clean(config.Layout_Mode).toUpperCase();
                                            if(mode === 'CATEGORIE') { state.step = 'cat'; renderCat(true); }
                                            else if(mode === 'UNICA') { state.step = 'items'; renderItems(true); }
                                            else { state.step = 'macro'; renderMacro(); }

                                            setTimeout(() => document.getElementById('loader').style.display = 'none', parseInt(config.Loader_Time) || 1000);
                            } catch(e) { console.error("Error:", e); }
                }

                async function fetchCSV(gid) {
                            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}&t=${Date.now()}`;
                            const res = await fetch(url);
                            const text = await res.text();
                            return new Promise(res => Papa.parse(text, {header:true, skipEmptyLines:true, complete: o => res(o.data)}));
                }

                function applyUI() {
                            const root = document.documentElement;
                            const body = document.body;

                            root.style.setProperty('--bg', config.App_Bg_Color);
                            root.style.setProperty('--accent', config.Filter_Active_Color || '#f4fc03');

                            // Sfondo
                            if(_clean(config.App_Bg_Type).toUpperCase() === 'IMAGE' && config.App_Bg_Image) {
                                            body.style.backgroundImage = `url('${config.App_Bg_Image}')`;
                                            body.style.backgroundSize = config.App_Bg_Size;
                                            body.style.backgroundPosition = config.App_Bg_Pos;
                            } else {
                                            body.style.backgroundColor = config.App_Bg_Color;
                            }

                            // Font
                            const f1 = config.Font_Main || 'Montserrat';
                            document.getElementById('dynamic-fonts').href = `https://fonts.googleapis.com/css2?family=${f1.replace(/ /g,'+')}&display=swap`;
                            body.style.fontFamily = `'${f1}', sans-serif`;

                            // Logo con controllo dimensione
                            const logoDiv = document.getElementById('app-logo');
                            if(_clean(config.Logo_Type).toUpperCase() === 'IMAGE' && config.Logo_URL) {
                                            const size = config.Logo_Img_Size || '100px';
                                            logoDiv.innerHTML = `<img src="${config.Logo_URL}" style="width:${size}">`;
                            } else {
                                            logoDiv.innerHTML = `<h1 style="color:${config.Logo_Text_Color}; font-size:${config.Logo_Text_Size}">${config.Logo_Text}</h1>`;
                            }

                            // Sottotitolo
                            const sub = document.getElementById('app-subtitle');
                            sub.innerText = config.App_Subtitle;
                            sub.style.cssText = `color:${config.Subtitle_Color}; font-size:${config.Subtitle_Size}; display:${_isYes(config.Show_Subtitle)?'block':'none'}; margin-top:${config.Subtitle_Margin}; text-align:${config.Subtitle_Align}`;

                            // Bottone Top
                            const bTop = document.getElementById('btn-top');
                            bTop.style.background = config.Btn_Top_Bg;
                            bTop.style.color = config.Btn_Top_Simbol_Color;
                            if(_clean(config.Btn_Top_Aling).includes('center')) bTop.style.left = 'calc(50% - 25px)';
                            else bTop.style.right = '20px';
                }
