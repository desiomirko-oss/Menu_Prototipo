<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff" id="meta-theme-color">
    <link rel="apple-touch-icon" href="/assets/icon-192x192.png">
    
    <link rel="stylesheet" href="/css/style.css">
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p>Caricamento menu...</p>
    </div>

    <div id="app" class="hidden">
        
        <header id="main-header">
            <div id="logo-container"></div>
            <div class="header-controls">
                <select id="language-selector" aria-label="Cambia Lingua"></select>
                <button id="refresh-cache-btn" aria-label="Aggiorna Menu">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                </button>
            </div>
        </header>

        <nav id="categories-nav" class="scrollable-x"></nav>

        <main id="menu-items-container"></main>

        <footer id="app-footer" class="hidden"></footer>

        <div id="product-modal" class="modal hidden">
            <div class="modal-content">
                <button id="close-modal" aria-label="Chiudi">&times;</button>
                <div id="modal-body"></div>
                <div id="ar-container" class="hidden"></div>
            </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
