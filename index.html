<!DOCTYPE html>
<html id="html-tag" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Digitale Premium</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="google" content="translate"> 
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            /* VARIABILI DINAMICHE */
            --app-bg: #f9fafb; --app-bg-img: none; --app-bg-size: cover; --app-bg-pos: center;
            --header-bg: rgba(255, 255, 255, 0.95); --header-h: 120px;
            --back-bg: rgba(255, 255, 255, 0.9); --back-color: #4f46e5; --macro-h: 180px;
            --card-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            --menu-card-bg: #ffffff; --menu-card-p: 20px; --menu-card-r: 24px;
            --menu-card-border: 1px solid #f3f4f6; --menu-card-shadow: var(--card-shadow);
            --cat-card-min-h: 80px; --item-card-min-h: 120px;
            --macro-t-f: sans-serif; --macro-t-c: #ffffff; --macro-t-s: 20px; --macro-txt-sh: none;
            --i-name-f: sans-serif; --i-name-c: #111827; --i-name-s: 18px; --i-name-w: bold;
            --i-pric-c: #4f46e5;
            --flt-bg-a: #4f46e5; --flt-c-a: #ffffff;
        }

        body {
            background-color: var(--app-bg) !important;
            background-image: var(--app-bg-img) !important;
            background-size: var(--app-bg-size) !important;
            background-position: var(--app-bg-pos) !important;
            background-attachment: fixed !important;
            min-height: 100vh; margin: 0; overscroll-behavior-y: none;
        }

        #main-header {
            background: var(--header-bg); min-height: var(--header-h); 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 999;
            display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 10px 20px; overflow: hidden;
        }

        #sub-header {
            background: var(--header-bg); position: fixed; width: 100%; z-index: 998; left: 0; display: none; 
            flex-direction: column; align-items: center; border-radius: 0; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border-top: 1px solid rgba(0,0,0,0.05);
        }

        #back-button {
            position: fixed; left: 15px; width: 44px; height: 44px;
            background: var(--back-bg); color: var(--back-color);
            display: none; align-items: center; justify-content: center; border-radius: 50%;
            box-shadow: var(--card-shadow); z-index: 1000; border: 1px solid rgba(0,0,0,0.05); cursor: pointer;
        }

        .macro-card { height: var(--macro-h); border-radius: 1.25rem; background-size: cover; background-position: center; position: relative; overflow: hidden; box-shadow: var(--card-shadow); cursor: pointer;}
        .macro-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.4)); }
        
        .macro-text-inside { 
            font-family: var(--macro-t-f) !important; color: var(--macro-t-c) !important; 
            font-size: var(--macro-t-s) !important; text-shadow: var(--macro-txt-sh) !important; 
        }

        .menu-card { background-color: var(--menu-card-bg); padding: var(--menu-card-p); border-radius: var(--menu-card-r); box-shadow: var(--menu-card-shadow); border: var(--menu-card-border); }
        .cat-card { min-height: var(--cat-card-min-h); position: relative; background-size: cover; background-position: center; overflow: hidden; cursor: pointer;}
        .cat-overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.7), rgba(0,0,0,0.2)); border-radius: inherit; }

        .item-name { font-family: var(--i-name-f); color: var(--i-name-c); font-size: var(--i-name-s); font-weight: var(--i-name-w); }
        .item-price { color: var(--i-pric-c); font-weight: bold; }
        .item-photo { width: var(--i-photo-w); height: var(--i-photo-h); flex-shrink: 0; border-radius: 0.75rem; object-fit: cover; }
        
        .filter-container { display: flex; gap: 8px; overflow-x: auto; padding: 10px 20px 15px 20px; scrollbar-width: none; }
        .filter-btn { padding: 8px 16px; border-radius: 9999px; font-size: 11px; font-weight: bold; text-transform: uppercase; background: #f3f4f6; color: #9ca3af; flex-shrink: 0; border: none; cursor: pointer; transition: all 0.2s; }
        .filter-btn.active { background: var(--flt-bg-a) !important; color: var(--flt-c-a) !important; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .ar-badge { background: #111827; color: white; font-size: 10px; padding: 4px 10px; border-radius: 999px; font-weight: bold; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; }
        
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--back-color); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header id="main-header">
        <div id="header-content-wrapper">
            <div id="logo-container" class="w-full flex items-center"></div>
            <div id="subtitle-container"></div>
            <div id="level-title-inside" style="display: none; letter-spacing: 0.1em; text-transform: uppercase;"></div>
        </div>
    </header>

    <div id="sub-header">
        <h2 id="sub-header-title" class="text-[12px] font-black text-gray-500 uppercase tracking-[0.2em] pt-4 px-4 text-center"></h2>
        <div id="sub-header-filters" class="filter-container justify-start sm:justify-center"></div>
    </div>

    <button id="back-button" onclick="goBack()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <main id="main-content" class="px-5 pb-10 max-w-md mx-auto relative">
        <div id="loading-screen" class="flex flex-col items-center pt-20">
            <div class="loader mb-4"></div>
            <p class="text-gray-400 text-sm uppercase tracking-widest mt-2">Sincronizzazione...</p>
        </div>
        <section id="page-macro" style="display: none;"><div id="macro-layout-container" class="grid grid-cols-1 gap-4"></div></section>
        <section id="page-categories" style="display: none;" class="space-y-4"></section>
        <section id="page-items" style="display: none;" class="space-y-4"></section>
    </main>

    <script>
        // PROTOCOLLO ANTI-CACHE
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => { regs.forEach(r => r.unregister()); });
        }

        const urlParams = new URLSearchParams(window.location.search);
        const SHEET_ID = urlParams.get('id'); 
        let appConfig = {};
        let fullData = [];
        let navigationStack = ['page-macro'];
        let activeFilters = []; 
        let currentMacroName = '', currentCategoryName = '';

        // FUNZIONE TRADUZIONE SILENZIOSA
        function handleSilentTranslation(configLang) {
            const deviceLang = navigator.language.split('-')[0].toLowerCase();
            const menuLang = String(configLang || 'it').toLowerCase().trim();
            const html = document.getElementById('html-tag');

            if (deviceLang !== menuLang) {
                // Imposta l'attributo lang sulla lingua del menu.
                // Questo "dice" al browser dell'utente che la pagina è straniera,
                // innescando la traduzione automatica nativa del dispositivo.
                html.setAttribute('lang', menuLang);
            } else {
                html.setAttribute('lang', deviceLang);
            }
        }

        function formatImgUrl(url) {
            if (!url) return '';
            let f = String(url).trim();
            const driveRegex = /drive\.google\.com\/file\/d\/([^\/]+)/;
            const match = f.match(driveRegex);
            if (match && match[1]) return `https://drive.google.com/uc?export=view&id=${match[1]}`;
            if (f.includes('dropbox.com')) return f.replace('dl=0', 'raw=1');
            return f;
        }

        function getVal(key, def) {
            const k = String(key).toLowerCase().trim();
            let v = appConfig[k];
            if (v === undefined || v === null || v === '' || String(v).toLowerCase() === 'undefined' || v === '-') return def;
            return String(v).trim();
        }

        function isTruthy(val) {
            const v = String(val || '').toUpperCase().trim();
            return ['TRUE', 'SI', 'SÌ', 'YES', '1', 'VERO', 'ON'].includes(v);
        }

        function safeParseCSVRow(str) {
            let arr = [], quote = false, cell = '';
            for (let i = 0; i < str.length; i++) {
                let c = str[i];
                if (c === '"' && str[i+1] === '"') { cell += '"'; i++; } 
                else if (c === '"') { quote = !quote; }
                else if (c === ',' && !quote) { arr.push(cell.trim()); cell = ''; }
                else { cell += c; }
            }
            arr.push(cell.trim());
            return arr.map(x => x.replace(/^"|"$/g, '').trim());
        }

        async function init() {
            if (!SHEET_ID) return;
            await fetchConfig(); 
            applyConfig(); 
            await fetchMenu();
            window.addEventListener('resize', autoAdjustPadding);
        }

        async function fetchConfig() {
            const r = Math.random().toString(36).substring(7);
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Config&_t=${Date.now()}&_r=${r}`;
            try {
                let res = await fetch(url);
                let csv = await res.text();
                if (!csv.toLowerCase().includes('logo_')) {
                    const fUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=config&_t=${Date.now()}`;
                    res = await fetch(fUrl); csv = await res.text();
                }
                appConfig = {};
                csv.split(/\r?\n/).forEach(row => {
                    const cols = safeParseCSVRow(row);
                    if(cols.length >= 2) {
                        let k = cols[0].toLowerCase().replace(/,+$/, '').trim();
                        let v = cols[1] ? cols[1].replace(/;/g, ',').trim() : '';
                        appConfig[k] = v;
                    }
                });
            } catch(e) { console.error("Config Error"); }
        }

        function applyConfig() {
            const root = document.documentElement;
            
            // LOGICA TRADUZIONE
            handleSilentTranslation(getVal('App_Language', 'it'));

            // SFONDO (Sistemato)
            const bgUrl = formatImgUrl(getVal('Bg_Image_URL', ''));
            const bgType = getVal('Bg_Type', 'color').toLowerCase();
            root.style.setProperty('--app-bg', getVal('Bg_Color', '#f9fafb'));
            if(bgUrl !== '' || bgType.includes('img')) {
                root.style.setProperty('--app-bg-img', `url('${bgUrl}')`);
            } else {
                root.style.setProperty('--app-bg-img', 'none');
            }
            root.style.setProperty('--app-bg-size', getVal('Bg_Image_Size', 'cover'));
            root.style.setProperty('--app-bg-pos', getVal('Bg_Image_Pos', 'center'));

            // LOGO
            const logoCont = document.getElementById('logo-container');
            const logoUrl = formatImgUrl(getVal('Logo_Image_URL', ''));
            const align = getVal('Logo_Align', 'center').toLowerCase();
            logoCont.className = `w-full flex justify-${align === 'left' ? 'start' : align === 'right' ? 'end' : 'center'}`;
            if (logoUrl !== '') {
                logoCont.innerHTML = `<img src="${logoUrl}" style="max-height:${getVal('Logo_Image_Size', '60px')}; object-fit:contain;">`;
            } else {
                const bld = isTruthy(getVal('Logo_Text_Bold', 'TRUE')) ? 'bold' : 'normal';
                logoCont.innerHTML = `<h1 style="color:${getVal('Logo_Text_Color', '#000')}; font-size:${getVal('Logo_Text_Size', '28px')}; font-weight:${bld}; font-family:${getVal('Logo_Text_Font', 'sans-serif')}; margin:0;">${getVal('Logo_Text', 'MENU')}</h1>`;
            }

            root.style.setProperty('--header-bg', getVal('Header_BgColor', 'rgba(255, 255, 255, 0.95)'));
            root.style.setProperty('--header-h', getVal('Header_Height', '120px'));
            root.style.setProperty('--macro-h', getVal('Macro_Height', '180px'));
            root.style.setProperty('--back-bg', getVal('Back_Btn_Bg', 'rgba(255, 255, 255, 0.9)'));
            root.style.setProperty('--back-color', getVal('Back_Btn_Color', '#000'));
            root.style.setProperty('--macro-t-s', getVal('Macro_Text_Size', '20px'));
            root.style.setProperty('--flt-bg-a', getVal('Filter_BgColor_Active', '#4f46e5'));
            
            const sub = document.getElementById('subtitle-container');
            if(!isTruthy(getVal('Subtitle_Show', 'TRUE'))) sub.style.display = 'none';
            else {
                sub.style.display = 'block'; sub.innerText = getVal('Subtitle_Text', '');
                sub.style.cssText = `color:${getVal('Subtitle_Color', '#666')}; font-size:${getVal('Subtitle_Size', '14px')}; text-align:center; margin-top:5px;`;
            }
        }

        async function fetchMenu() {
            const r = Math.random().toString(36).substring(7);
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Menu&_t=${Date.now()}&_r=${r}`;
            try {
                let res = await fetch(url);
                let csv = await res.text();
                if (!csv.toLowerCase().includes('macro')) {
                    const fUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=menu&_t=${Date.now()}`;
                    res = await fetch(fUrl); csv = await res.text();
                }
                fullData = [];
                csv.split(/\r?\n/).forEach(row => {
                    const c = safeParseCSVRow(row);
                    if(c.length >= 11 && c[0].toLowerCase() !== 'macro') {
                        fullData.push({ macro: c[0], cat: c[1], name: c[2], desc: c[3], allerg: c[4], price: c[5], gf: c[6], vegan: c[7], veg: c[8], noalc: c[9], active: c[10], photo: c[11], ar: c[12] });
                    }
                });
                fullData = fullData.filter(i => isTruthy(i.active));
                document.getElementById('loading-screen').style.display = 'none';
                renderLevel1();
            } catch(e) { console.error("Menu Error"); }
        }

        function renderLevel1() {
            const cont = document.getElementById('macro-layout-container');
            cont.innerHTML = '';
            const macros = [...new Set(fullData.map(i => i.macro))];
            macros.forEach(m => {
                const img = formatImgUrl(getVal(`Macro_Img_${m}`, ''));
                cont.innerHTML += `<div onclick="renderLevel2('${m}')" class="macro-card flex items-center justify-center" style="background-image:url('${img}')">
                    <div class="macro-overlay"></div><span class="relative z-10 text-white font-bold uppercase tracking-widest macro-text-inside">${m}</span></div>`;
            });
            showPage('page-macro');
        }

        function renderLevel2(mName) {
            const cont = document.getElementById('page-categories');
            cont.innerHTML = '';
            const cats = [...new Set(fullData.filter(i => i.macro === mName).map(i => i.cat))];
            cats.forEach(c => {
                const img = formatImgUrl(getVal(`Category_Img_${c}`, ''));
                cont.innerHTML += `<div onclick="renderLevel3('${mName}', '${c}')" class="menu-card cat-card flex justify-between items-center" style="background-image:url('${img}')">
                    <div class="cat-overlay"></div><span class="relative z-10 font-bold text-white text-lg">${c}</span>
                    <svg class="w-5 h-5 relative z-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
            });
            navigationStack.push('page-categories');
            showPage('page-categories');
        }

        function toggleFilter(f) {
            activeFilters = activeFilters.includes(f) ? [] : [f];
            renderLevel3(currentMacroName, currentCategoryName, true);
        }

        function renderLevel3(m, c, isF = false) {
            currentMacroName = m; currentCategoryName = c;
            const cont = document.getElementById('page-items');
            if(!isF) {
                document.getElementById('sub-header-title').innerText = c;
                const fCont = document.getElementById('sub-header-filters');
                const isD = m.toLowerCase().includes('bev');
                fCont.innerHTML = isD ? `<button onclick="toggleFilter('noalc')" class="filter-btn ${activeFilters.includes('noalc')?'active':''}">Analcolico</button>` : 
                `<button onclick="toggleFilter('gf')" class="filter-btn ${activeFilters.includes('gf')?'active':''}">Senza Glutine</button>
                 <button onclick="toggleFilter('vegan')" class="filter-btn ${activeFilters.includes('vegan')?'active':''}">Vegano</button>`;
            }
            cont.innerHTML = '';
            let items = fullData.filter(i => i.macro === m && i.cat === c);
            if(activeFilters.length > 0) items = items.filter(i => isTruthy(i[activeFilters[0]]));
            
            items.forEach(i => {
                const photo = formatImgUrl(i.photo);
                const ar = formatImgUrl(i.ar);
                cont.innerHTML += `<div class="menu-card flex gap-4">
                    <div class="flex-grow">
                        <h3 class="item-name">${i.name}</h3><p class="text-sm text-gray-500">${i.desc}</p>
                        <p class="text-[10px] text-red-400 mt-1">${i.allerg?'Allergeni: '+i.allerg:''}</p>
                        ${ar ? `<a href="${ar}" class="ar-badge">🔍 VEDI AR</a>` : ''}
                        <div class="mt-3 item-price">${i.price}€</div>
                    </div>
                    ${photo ? `<img src="${photo}" class="item-photo">` : ''}
                </div>`;
            });
            if(!isF) { navigationStack.push('page-items'); showPage('page-items'); }
        }

        function showPage(p) {
            ['page-macro', 'page-categories', 'page-items'].forEach(s => document.getElementById(s).style.display = 'none');
            document.getElementById(p).style.display = 'block';
            document.getElementById('sub-header').style.display = p === 'page-items' ? 'flex' : 'none';
            document.getElementById('back-button').style.display = p === 'page-macro' ? 'none' : 'flex';
            autoAdjustPadding();
        }

        function autoAdjustPadding() {
            setTimeout(() => {
                const h = document.getElementById('main-header').offsetHeight;
                const sh = document.getElementById('sub-header');
                const btn = document.getElementById('back-button');
                btn.style.top = (h/2 - 22) + 'px';
                let total = h + (sh.style.display !== 'none' ? sh.offsetHeight : 0);
                sh.style.top = h + 'px';
                document.getElementById('main-content').style.paddingTop = (total + 20) + 'px';
            }, 50);
        }

        function goBack() { if(navigationStack.length > 1) { navigationStack.pop(); showPage(navigationStack[navigationStack.length-1]); } }
        
        init();
    </script>
</body>
</html>
