<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PWA Universal Engine</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link id="dynamic-font" rel="stylesheet">
    <style>
        :root { --primary: #000; --bg: #fff; --accent: #ffcc00; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--primary); overflow-x: hidden; }
        
        /* Schermata di Caricamento Divina */
        #loader { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            display:flex; flex-direction:column; justify-content:center; align-items:center; 
            background: #fff; z-index:9999; transition: opacity 0.5s;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loader-text { margin-top: 20px; font-weight: bold; font-size: 1.2rem; }
        #slow-connection-msg { margin-top: 10px; font-size: 0.9rem; color: #666; display: none; text-align: center; padding: 0 20px; }

        /* Struttura Menu */
        header { padding: 30px 20px; text-align: center; }
        .category-block { margin-bottom: 30px; }
        .category-title { padding: 15px; font-size: 1.5rem; font-weight: 900; text-transform: uppercase; position: sticky; top: 0; z-index: 100; }
        
        .layout-GRID { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .layout-LIST { display: flex; flex-direction: column; gap: 12px; padding: 15px; }

        .card { background: var(--card-bg, #fff); padding: 15px; border-radius: 15px; display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s; }
        .card-price { font-weight: bold; font-size: 1.2rem; margin-top: 10px; color: var(--accent); }
        .card-desc { font-size: 0.85rem; opacity: 0.7; margin: 5px 0; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="loader-text">Caricamento Divino...</div>
    <div id="slow-connection-msg"></div> </div>

<div id="google_translate_element" style="display:none;"></div>
<header id="app-header"></header>
<main id="app-render"></main>

<script>
const params = new URLSearchParams(window.location.search);
const SHEET_ID = params.get('id');

// Messaggio di fallback se la linea è lenta (Configurabile dal foglio o hardcoded qui)
const SLOW_MSG_DEFAULT = "Stiamo preparando le prelibatezze per te, ancora un istante...";

// Funzione di emergenza: se dopo 4 secondi non ha caricato, mostra il messaggio
const slowTimer = setTimeout(() => {
    const msgElement = document.getElementById('slow-connection-msg');
    msgElement.style.display = 'block';
}, 4000);

async function startEngine() {
    if (!SHEET_ID) {
        document.getElementById('loader-text').innerHTML = "⚠️ ID mancante nell'URL!<br><small>Usa ?id=TUO_ID</small>";
        return;
    }

    try {
        // Carichiamo i dati dai fogli (GID 0 per Config, GID specifico per Menu)
        // TIP: Per trovare il GID del foglio Menu, aprilo nel browser e guarda la fine dell'URL (gid=XXXX)
        const configData = await fetchCSV(0);
        const cfg = {}; 
        configData.forEach(r => cfg[r.Parametro] = r.Valore);

        // Personalizziamo il caricamento con i dati del foglio se presenti
        if(cfg.Loading_Msg) document.getElementById('slow-connection-msg').innerText = cfg.Loading_Msg;
        else document.getElementById('slow-connection-msg').innerText = SLOW_MSG_DEFAULT;

        const menuData = await fetchCSV(595974812); // <--- SOSTITUISCI QUESTO GID CON QUELLO DEL TUO FOGLIO MENU

        applyDesign(cfg);
        renderContent(menuData, cfg);
        
        clearTimeout(slowTimer);
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        
        initTranslate();
    } catch (err) {
        document.getElementById('loader-text').innerHTML = "⚠️ Errore di Connessione.<br><small>Verifica che il foglio sia 'Pubblicato sul Web'</small>";
        console.error(err);
    }
}

function fetchCSV(gid) {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/pub?gid=${gid}&output=csv&nocache=${Date.now()}`;
    return new Promise((resolve, reject) => {
        Papa.parse(url, {
            download: true, header: true,
            complete: r => r.data.length > 0 ? resolve(r.data) : reject("Empty"),
            error: e => reject(e)
        });
    });
}

function applyDesign(cfg) {
    const root = document.documentElement;
    if(cfg.Font_Main) {
        document.getElementById('dynamic-font').href = `https://fonts.googleapis.com/css2?family=${cfg.Font_Main.replace(/ /g, '+')}&display=swap`;
        document.body.style.fontFamily = `'${cfg.Font_Main}', sans-serif`;
    }
    root.style.setProperty('--bg', cfg.App_Bg_Color || '#fff');
    root.style.setProperty('--accent', cfg.Filter_Active_Color || '#ffcc00');
    
    const header = document.getElementById('app-header');
    header.innerHTML = cfg.Logo_Type === 'TEXT' ? `<h1>${cfg.Logo_Text}</h1>` : `<img src="${cfg.Logo_URL}" style="max-height:80px">`;
    header.innerHTML += cfg.Show_Subtitle === 'SI' ? `<p style="color:${cfg.Subtitle_Color}">${cfg.App_Subtitle}</p>` : '';
}

function renderContent(data, cfg) {
    const main = document.getElementById('app-render');
    const categories = [...new Set(data.map(i => i.Categoria))].filter(c => c);

    categories.forEach(cat => {
        const section = document.createElement('section');
        section.className = 'category-block';
        section.innerHTML = `<div class="category-title" style="background:${cfg.Filter_Active_Color || '#eee'}">${cat}</div>`;
        
        const grid = document.createElement('div');
        grid.className = `layout-${cfg.Cat_Layout || 'LIST'}`;
        
        data.filter(i => i.Categoria === cat && i.Attivo === 'SI').forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            if(cfg.Show_Cards === 'SI') card.style.boxShadow = '0 4px 12px rgba(0,0,0,0.08)';
            card.style.background = cfg.Card_Bg || '#fff';

            card.innerHTML = `
                <div>
                    <div style="font-weight:bold; font-size:1.1rem">${item.Nome_IT}</div>
                    <div class="card-desc">${item.Desc_IT || ''}</div>
                    <div style="font-size:0.7rem; color:red">${item.Allerg_IT || ''}</div>
                </div>
                <div class="card-price">€${item.Prezzo}</div>
            `;
            grid.appendChild(card);
        });
        
        section.appendChild(grid);
        main.appendChild(section);
    });
}

function initTranslate() {
    const userLang = navigator.language.split('-')[0];
    if (userLang === 'it') return;
    
    window.googleTranslateElementInit = () => {
        new google.translate.TranslateElement({pageLanguage: 'it', autoDisplay: true}, 'google_translate_element');
        setTimeout(() => {
            const select = document.querySelector('.goog-te-combo');
            if(select) { select.value = userLang; select.dispatchEvent(new Event('change')); }
        }, 1500);
    };
    const s = document.createElement('script');
    s.src = "//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
    document.head.appendChild(s);
}

startEngine();
</script>

</body>
</html>
