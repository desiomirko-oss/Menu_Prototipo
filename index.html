<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <title>Smart Menu Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root { --p: #000; --bg: #f8f9fa; --f-main: 'Arial', sans-serif; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; }
        body { font-family: var(--f-main); background: var(--bg); color: #222; min-height: 100vh; transition: 0.3s; }
        
        #loader { position:fixed; inset:0; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
        .spin { width:40px; height:40px; border:4px solid #f3f3f3; border-top:4px solid var(--p); border-radius:50%; animation: s 1s linear infinite; }
        @keyframes s { 100% { transform:rotate(360deg); } }

        header { padding: 30px 20px; text-align:center; position:sticky; top:0; z-index:1000; background:rgba(255,255,255,0.8); backdrop-filter:blur(15px); }
        #logo-box img { display: block; margin: 0 auto; cursor:pointer; }
        #sub-box { margin-top: 5px; font-weight: 500; }

        .container { padding:15px; max-width:800px; margin:auto; }

        /* Filtri */
        #filter-bar { display:flex; justify-content:center; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
        .f-btn { padding:8px 15px; border-radius:50px; border:1px solid #ddd; background:#fff; font-size:11px; font-weight:bold; cursor:pointer; transition:0.2s; text-transform:uppercase; }
        .f-btn.active { background:var(--p); color:#fff; border-color:var(--p); }

        /* Layouts */
        .grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
        .list { display:flex; flex-direction:column; gap:12px; }

        .card-main { 
            position:relative; border-radius:18px; overflow:hidden; display:flex; 
            align-items:center; justify-content:center; cursor:pointer; 
            box-shadow:0 8px 20px rgba(0,0,0,0.1); height: 180px;
        }
        .card-main img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }
        .card-main .ov { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.8), transparent); z-index:2; }
        .card-main span { position:relative; z-index:3; text-transform:uppercase; font-weight:900; text-align:center; padding:10px; color:#fff; }

        .dish-card { background:#fff; border-radius:15px; padding:12px; display:flex; margin-bottom:12px; border:1px solid #eee; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.03); }
        .dish-img { width:80px; height:80px; object-fit:cover; border-radius:10px; margin-right:15px; }
        .dish-info { flex:1; }
        .dish-name { font-weight:800; font-size:1rem; margin-bottom:2px; }
        .dish-desc { font-size:0.8rem; color:#666; line-height:1.3; }
        .dish-price { font-weight:900; color:var(--p); margin-top:5px; font-size:1.1rem; }

        .back-nav { display:inline-block; padding:8px 20px; background:#000; color:#fff; border-radius:50px; margin-bottom:15px; cursor:pointer; font-size:11px; font-weight:bold; }
        .ani { animation: a 0.3s ease-out; }
        @keyframes a { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>

<div id="loader"><div class="spin"></div><p id="l-msg" style="margin-top:15px; font-size:10px; font-weight:bold;">SINCRONIZZAZIONE...</p></div>

<header id="h-main">
    <div id="logo-box"></div>
    <div id="sub-box"></div>
</header>

<div class="container">
    <div id="filter-bar"></div>
    <div id="view"></div>
</div>

<script src="app.js"></script>
<script>
    const SID = new URLSearchParams(window.location.search).get('id');
    let db = [], cfg = {}, state = { m: null, c: null, f: { gf: false, v: false, a: false } };

    // Pulizia chiavi: rimuove spazi, underscore e mette in minuscolo
    const cl = (s) => s ? s.toString().toLowerCase().trim().replace(/[^a-z0-9]/g, '') : '';

    function parseCSV(text) {
        return text.split('\n').map(line => {
            const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            return matches ? matches.map(m => m.replace(/^"|"$/g, '').trim()) : [];
        });
    }

    async function init() {
        if(!SID) { document.getElementById('l-msg').innerText = "FOGLIO NON COLLEGATO"; return; }
        try {
            const [rC, rM] = await Promise.all([
                fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Config&v=${Date.now()}`).then(r => r.text()),
                fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv&sheet=Menu&v=${Date.now()}`).then(r => r.text())
            ]);

            parseCSV(rC).forEach(r => { if(r[0] && r[1]) cfg[cl(r[0])] = r[1]; });

            const csvM = parseCSV(rM);
            const hs = csvM[0].map(h => cl(h));
            db = csvM.slice(1).map(row => {
                let o = {};
                hs.forEach((h, i) => o[h] = row[i] || '');
                return o;
            }).filter(i => cl(i.attivo) === 'si');

            applyStyles();
            render();
            
            setTimeout(() => { document.getElementById('loader').style.display='none'; }, parseInt(cfg.loadertime) || 800);
        } catch (e) { document.getElementById('l-msg').innerText = "ERRORE CONNESSIONE FOGLIO"; }
    }

    function applyStyles() {
        const s = document.body.style;
        // Background
        if(cl(cfg.appbgtype) === 'image') {
            s.backgroundImage = `url('${cfg.appbgimage}')`;
            s.backgroundSize = cfg.appbgsize || 'cover';
            s.backgroundPosition = cfg.appbgpos || 'center';
            s.backgroundAttachment = 'fixed';
        } else {
            s.backgroundColor = cfg.appbgcolor || '#f8f9fa';
        }
        
        // Font e Colore Primario
        if(cfg.fontmain) document.documentElement.style.setProperty('--f-main', cfg.fontmain);
        document.documentElement.style.setProperty('--p', cfg.loadertimecolor || '#000');

        // Logo
        const lb = document.getElementById('logo-box');
        if(cl(cfg.logotype) === 'image' && cfg.logourl) {
            lb.innerHTML = `<img src="${cfg.logourl}" style="width:${cfg.logoimgsize || '200px'}" onclick="nav(null,null)">`;
        } else {
            lb.innerHTML = `<h1 onclick="nav(null,null)" style="color:${cfg.logotextcolor}; font-size:${cfg.logotextsize}">${cfg.logotext || 'MENU'}</h1>`;
        }

        // Sottotitolo
        const sb = document.getElementById('sub-box');
        sb.innerText = cfg.appsubtitle || cfg.subtitletext || '';
        sb.style.color = cfg.subtitlecolor || '#666';
        sb.style.fontSize = cfg.subtitlesize || '0.9rem';
    }

    function renderFilters() {
        const bar = document.getElementById('filter-bar');
        if (cl(cfg.showfilters) !== 'si' || !state.c) { bar.innerHTML = ''; return; }
        
        bar.innerHTML = `
            <button class="f-btn ${state.f.gf?'active':''}" onclick="toggleF('gf')">Senza Glutine</button>
            <button class="f-btn ${state.f.v?'active':''}" onclick="toggleF('v')">Vegano</button>
            <button class="f-btn ${state.f.a?'active':''}" onclick="toggleF('a')">Analcolico</button>
        `;
    }

    window.toggleF = (type) => {
        state.f[type] = !state.f[type];
        render();
    };

    function render() {
        const out = document.getElementById('view');
        renderFilters();
        out.innerHTML = '';

        if (!state.m) {
            // LIVELLO 1: MACRO
            const ms = [...new Set(db.map(i => i.macro).filter(Boolean))];
            let h = `<div class="${cl(cfg.macrolayout) === 'grid' ? 'grid' : 'list'} ani">`;
            ms.forEach(m => {
                const img = cfg['macroimg' + cl(m)] || db.find(i => i.macro === m && i.fotourl)?.fotourl || '';
                h += `<div class="card-main" style="height:${cfg.macroheight || '200px'}" onclick="nav('${m}', null)">
                    <img src="${img}"><div class="ov"></div>
                    <span style="color:${cfg.macrotextcolor}; font-size:${cfg.macrotextsize}">${m}</span>
                </div>`;
            });
            out.innerHTML = h + '</div>';
        } else if (!state.c) {
            // LIVELLO 2: CATEGORIE
            const cats = [...new Set(db.filter(i => i.macro === state.m).map(i => i.categoria))];
            let h = `<div class="back-nav" onclick="nav(null,null)">← MENU</div>`;
            h += `<div class="${cl(cfg.catlayout) === 'grid' ? 'grid' : 'list'} ani">`;
            cats.forEach(c => {
                const img = db.find(i => i.categoria === c && i.fotourl)?.fotourl || '';
                const showImg = cl(cfg.catimgshow) !== 'no';
                h += `<div class="card-main" style="height:120px" onclick="nav('${state.m}', '${c}')">
                    ${showImg ? `<img src="${img}"><div class="ov"></div>` : ''}
                    <span style="color:${showImg ? '#fff' : (cfg.textcattitlecolor || '#000')}">${c}</span>
                </div>`;
            });
            out.innerHTML = h + '</div>';
        } else {
            // LIVELLO 3: PIATTI (Con Filtri)
            let items = db.filter(i => i.macro === state.m && i.categoria === state.c);
            
            // Applicazione logica filtri
            if(state.f.gf) items = items.filter(i => cl(i.senzaglutine) === 'si');
            if(state.f.v) items = items.filter(i => cl(i.vegano) === 'si');
            if(state.f.a) items = items.filter(i => cl(i.analcolico) === 'si');

            let h = `<div class="back-nav" onclick="nav('${state.m}',null)">← ${state.c}</div><div class="ani">`;
            items.forEach(i => {
                h += `<div class="dish-card">
                    ${i.fotourl ? `<img src="${i.fotourl}" class="dish-img">` : ''}
                    <div class="dish-info">
                        <div class="dish-name">${i.nomeit}</div>
                        <div class="dish-desc">${i.descit || ''}</div>
                        <div class="dish-price">${parseFloat(i.prezzo) ? i.prezzo + '€' : ''}</div>
                    </div>
                </div>`;
            });
            out.innerHTML = h + (items.length === 0 ? '<p style="text-align:center; padding:20px; opacity:0.5;">Nessun piatto trovato con questi filtri.</p>' : '') + '</div>';
        }
    }

    window.nav = (m, c) => { state.m = m; state.c = c; window.scrollTo(0,0); render(); };
    init();
</script>
</body>
</html>
